homeassistant:
  name: Hello Smart Dev
  unit_system: metric
  time_zone: Australia/Sydney

# Debug logging for the integration
logger:
  default: warning
  logs:
    custom_components.hello_smart: debug
    homeassistant.helpers.update_coordinator: debug

# Minimal default config
default_config:

# Lovelace dashboards
lovelace:
  mode: storage
  dashboards:
    smart-vehicle:
      mode: yaml
      title: Smart Vehicle
      icon: mdi:car
      show_in_sidebar: true
      filename: dashboards/smart-vehicle.yaml
    smart-vehicle-basic:
      mode: yaml
      title: Smart Vehicle (Basic)
      icon: mdi:car-outline
      show_in_sidebar: true
      filename: dashboards/smart-vehicle-basic.yaml
